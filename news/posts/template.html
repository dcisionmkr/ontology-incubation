<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ▼ タイトルとdescriptionを記事に合わせて変更 -->
  <title>記事タイトル | Ontology incubation NEWS</title>
  <meta name="description" content="記事の概要を120字程度で書く" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <header class="site-header">
    <a href="../index.html" class="site-logo">
      Ontology incubation
      <span class="badge">NEWS</span>
    </a>
    <nav class="header-nav">
      <a href="https://sovren-framework.netlify.app/" target="_blank">SOVREN Framework</a>
    </nav>
  </header>

  <main>
    <div class="container">

      <a href="../index.html" class="back-link">← 記事一覧に戻る</a>

      <div class="article-header">
        <div class="article-header-meta">
          <!-- ▼ 日付とタグを変更 -->
          <span class="article-card-date">2026-00-00</span>
          <span class="tag">タグ1</span>
          <span class="tag">タグ2</span>
        </div>
        <!-- ▼ 記事タイトル -->
        <h1>記事タイトルをここに書く</h1>
        <!-- ▼ サブタイトル的な一文（任意） -->
        <p class="article-header-desc">記事の導入文・サブタイトルをここに書く。</p>
      </div>

      <div class="article-body">

        <!-- ============================================
             本文の書き方ガイド
             ============================================

             見出し2（セクション）:
             <h2>セクションタイトル</h2>

             見出し3（サブセクション）:
             <h3>サブセクションタイトル</h3>

             段落:
             <p>本文テキスト。<strong>強調</strong>も使えます。</p>

             箇条書き:
             <ul>
               <li>項目1</li>
               <li>項目2</li>
             </ul>

             番号付きリスト:
             <ol>
               <li>手順1</li>
               <li>手順2</li>
             </ol>

             引用ブロック（重要な一文を際立たせる）:
             <blockquote>
               <strong>「引用テキスト」</strong>
             </blockquote>

             コールアウト（情報ボックス）:
             <div class="callout">
               <p><strong>見出し</strong></p>
               <p>説明テキスト。<a href="URL">リンク</a>も入れられます。</p>
             </div>

             コードブロック（手順・コマンドなど）:
             <pre>コードや手順をここに書く</pre>

             テーブル:
             <table>
               <thead><tr><th>列1</th><th>列2</th></tr></thead>
               <tbody>
                 <tr><td>データ1</td><td>データ2</td></tr>
               </tbody>
             </table>

             区切り線:
             <hr>

        ============================================ -->

        <p>本文をここから書き始めます。</p>

        <hr>

        <h2>セクション1</h2>

        <p>内容を書く。</p>

        <h2>セクション2</h2>

        <p>内容を書く。</p>

      </div><!-- /.article-body -->

    </div><!-- /.container -->
  </main>

  <footer class="site-footer">
    <div class="container">
      &copy; 2026 Ontology incubation &nbsp;|&nbsp;
      <a href="https://sovren-framework.netlify.app/" target="_blank">SOVREN Framework</a>
    </div>
  </footer>

</body>
</html>
